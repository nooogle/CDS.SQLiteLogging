name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  LIBRARY_PROJECT: CDS.SQLiteLogging/CDS.SQLiteLogging.csproj
  TEST_PROJECT: CDS.SQLiteLogging.Tests/CDS.SQLiteLogging.Tests.csproj
  VIEWS_PROJECT: CDS.SQLiteLogging.Views/CDS.SQLiteLogging.Views.csproj
  WINFORMS_PROJECT: WinFormsTest/WinFormsTest.csproj
  CONSOLE_PROJECT: ConsoleTest/ConsoleTest.csproj
  BENCHMARK_PROJECT: Benchmarking/Benchmarking.csproj

jobs:
  build-and-test:
    name: Build Core Library & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Required for MinVer to calculate version from git history
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    
    - name: Restore core projects
      run: |
        dotnet restore ${{ env.LIBRARY_PROJECT }}
        dotnet restore ${{ env.TEST_PROJECT }}
    
    - name: Build core library
      run: dotnet build ${{ env.LIBRARY_PROJECT }} --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test --project ${{ env.TEST_PROJECT }} --configuration Release --verbosity normal -- --report-trx --coverage --coverage-output-format cobertura
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: test-results-${{ matrix.os }}
        path: '**/*.trx'
    
    - name: Upload coverage reports
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: '**/*.cobertura.xml'
    
    - name: Publish coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v6
      with:
        files: '**/*.cobertura.xml'
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  build-windows-projects:
    name: Build Windows Projects
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore Windows projects
      run: |
        dotnet restore ${{ env.VIEWS_PROJECT }}
        dotnet restore ${{ env.WINFORMS_PROJECT }}
        dotnet restore ${{ env.CONSOLE_PROJECT }}
        dotnet restore ${{ env.BENCHMARK_PROJECT }}

    - name: Build Windows projects
      run: |
        dotnet build ${{ env.VIEWS_PROJECT }} --configuration Release --no-restore
        dotnet build ${{ env.WINFORMS_PROJECT }} --configuration Release --no-restore
        dotnet build ${{ env.CONSOLE_PROJECT }} --configuration Release --no-restore
        dotnet build ${{ env.BENCHMARK_PROJECT }} --configuration Release --no-restore
