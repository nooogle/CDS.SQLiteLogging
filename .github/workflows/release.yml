name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  LIBRARY_PROJECT: CDS.SQLiteLogging/CDS.SQLiteLogging.csproj
  TEST_PROJECT: CDS.SQLiteLogging.Tests/CDS.SQLiteLogging.Tests.csproj
  PACKAGE_ID: CDS.SQLiteLogging

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Required for MinVer
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    
    - name: Restore dependencies
      run: |
        dotnet restore ${{ env.LIBRARY_PROJECT }}
        dotnet restore ${{ env.TEST_PROJECT }}
    
    - name: Build package project
      run: dotnet build ${{ env.LIBRARY_PROJECT }} --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test --project ${{ env.TEST_PROJECT }} --configuration Release --verbosity normal -- --report-trx
    
    - name: Pack NuGet package
      run: dotnet pack ${{ env.LIBRARY_PROJECT }} --configuration Release --no-build --output ./artifacts
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ./artifacts/*.nupkg
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Push to NuGet.org
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $pkg = (Get-ChildItem -Path ./artifacts -Filter "${{ env.PACKAGE_ID }}.*.nupkg").FullName
        dotnet nuget push $pkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
