name: CodeQL Security Scan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Mondays

jobs:
  analyze:
    name: Analyze Code Security
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: csharp
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore projects
      run: |
        dotnet restore CDS.SQLiteLogging/CDS.SQLiteLogging.csproj
        dotnet restore CDS.SQLiteLogging.Views/CDS.SQLiteLogging.Views.csproj
        dotnet restore CDS.SQLiteLogging.Tests/CDS.SQLiteLogging.Tests.csproj
        dotnet restore ConsoleTest/ConsoleTest.csproj
        dotnet restore WinFormsTest/WinFormsTest.csproj
        dotnet restore Benchmarking/Benchmarking.csproj
    
    - name: Build
      run: |
        dotnet build CDS.SQLiteLogging/CDS.SQLiteLogging.csproj --configuration Release --no-restore
        dotnet build CDS.SQLiteLogging.Views/CDS.SQLiteLogging.Views.csproj --configuration Release --no-restore
        dotnet build CDS.SQLiteLogging.Tests/CDS.SQLiteLogging.Tests.csproj --configuration Release --no-restore
        dotnet build ConsoleTest/ConsoleTest.csproj --configuration Release --no-restore
        dotnet build WinFormsTest/WinFormsTest.csproj --configuration Release --no-restore
        dotnet build Benchmarking/Benchmarking.csproj --configuration Release --no-restore
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
